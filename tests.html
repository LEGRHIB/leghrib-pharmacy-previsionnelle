<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leghrib Pharmacy V4 — Unit Tests</title>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #f1f5f9; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 16px; }
  .summary { padding: 16px; border-radius: 8px; margin-bottom: 24px; font-size: 18px; }
  .summary.pass { background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.3); color: #22c55e; }
  .summary.fail { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #ef4444; }
  .group { margin-bottom: 20px; }
  .group-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #334155; }
  .test { padding: 4px 12px; font-size: 13px; border-left: 3px solid; margin-bottom: 2px; }
  .test.pass { border-color: #22c55e; color: #94a3b8; }
  .test.fail { border-color: #ef4444; color: #ef4444; font-weight: 600; }
  .test .expected { color: #64748b; font-size: 11px; }
</style>
</head>
<body>
<h1>Leghrib Pharmacy V4 — Unit Tests</h1>
<div id="summary" class="summary"></div>
<div id="results"></div>
<script src="tests.js"></script>
</body>
</html>
